name: grow_first
description: "Service marketplace app to connect customers with local service providers."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+00003

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.12
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^8.2.0

  # Navigation
  go_router: ^16.2.0

  # Network & API
  dio: ^5.9.0
  retrofit: ^4.7.2
  json_annotation: ^4.9.0
  connectivity_plus: ^6.1.5

  # Local Storage & Database
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  path_provider: ^2.1.5

  # Authentication & Security
  crypto: ^3.0.6
  flutter_secure_storage: ^9.2.4

  # Functional Programming
  dartz: ^0.10.1

  dotted_border: ^3.1.0

  # Utils & Helpers
  intl: ^0.20.2
  logger: ^2.6.1
  freezed_annotation: ^3.1.0
  uuid: ^4.5.1
  url_launcher: ^6.3.2
  package_info_plus: ^8.3.1
  device_info_plus: ^11.5.0
  razorpay_flutter: 1.4.0
  webview_flutter: ^4.9.0
  google_mobile_ads: ^7.0.0

  # File Handling
  file_picker: ^10.3.2
  image_picker: ^1.2.0
  permission_handler: ^12.0.1

  # Font Sizing
  sizer: ^3.1.3
  
  # Firebase (Optional - uncomment if needed)
  # firebase_core: ^3.8.0
  # firebase_auth: ^5.3.3
  # firebase_crashlytics: ^4.1.8
  # firebase_analytics: ^11.3.8
  # firebase_messaging: ^15.1.8
  # cloud_firestore: ^5.5.0

  # Push Notifications
  onesignal_flutter: ^5.3.4

  # Testing Utilities (for integration tests)
  mockito: ^5.5.0

  #monitoring
  sentry_flutter: ^9.6.0
  datadog_flutter_plugin: ^2.12.0
  flutter_launcher_icons: ^0.14.4

  share_plus: ^12.0.1

  youtube_player_flutter: ^9.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting & Code Quality
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.7.0
  json_serializable: ^6.10.0
  retrofit_generator: ^10.0.2
  freezed: ^3.2.0

  # Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

  # Development Tools
  flutter_native_splash: ^2.4.2
  change_app_package_name: ^1.3.0

# Flutter configuration
flutter:
  uses-material-design: true
  generate: true

  # Assets
  assets:
      - assets/images/
      - assets/icons/
      - assets/animations/
      - assets/fonts/
      - assets/configs/
      - assets/svg/

  # Custom fonts
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/poppins/Poppins-SemiBold.ttf
          weight: 600

# App Icon Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/g_logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/g_logo.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/images/g_logo.png"
    icon_size: 48

# Native Splash Screen
flutter_native_splash:
  color: "#ffffff"
  image: assets/images/g_logo.png
  color_dark: "#121212"
  image_dark: assets/images/g_logo.png
  android_12:
    image: assets/images/g_logo.png
    icon_background_color: "#ffffff"
    image_dark: assets/images/g_logo.png
    icon_background_color_dark: "#121212"

# Code Generation Configuration
targets:
  $default:
    builders:
      json_serializable|json_serializable:
        options:
          explicit_to_json: true
          field_rename: snake_case
          include_if_null: false
